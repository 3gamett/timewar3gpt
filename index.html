<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>時空戦記 Complete Skill Edition</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>時空戦記 Complete Skill Edition</h1>
      <div class="sub">全スキル完全再現・デバッグ済み（時間操作は後回し）</div>
    </div>
    <div class="top-actions">
      <button id="btnLoadDefault">初期化</button>
      <button id="btnSample">サンプル編成</button>
      <button id="btnSave">保存</button>
    </div>
  </header>

  <main class="grid">
    <section class="panel log-panel">
      <div class="panel-head">
        <h2>戦闘ログ</h2>
        <div class="row">
          <button id="btnCopyLog">コピー</button>
          <button id="btnClearLog">消去</button>
        </div>
      </div>
      <div class="battle-control-row">
        <button id="btnStart" class="primary">戦闘開始</button>
        <button id="btnNext">次の挙動</button>
        <button id="btnAuto">オート</button>
        <button id="btnStop">停止</button>
      </div>
      <div class="battle-control-row">
        <span id="turnBadge">Turn 0</span>
        <span id="phaseBadge">Phase: -</span>
        <span id="stateBadge">待機中</span>
      </div>
      <div id="logArea" class="log-area"><pre id="log">準備完了。</pre></div>
    </section>

    <section class="panel formation-panel">
      <div class="panel-head">
        <h2>編成</h2>
        <button id="btnRefresh">反映</button>
      </div>
      <div class="two-col">
        <div>
          <h3>自軍</h3>
          <div id="leftSlots" class="slots"></div>
        </div>
        <div>
          <h3>敵軍</h3>
          <div id="rightSlots" class="slots"></div>
        </div>
      </div>
    </section>

    <section class="panel editor-panel">
      <div class="panel-head"><h2>英傑JSON</h2><button id="btnSaveHeroes">英傑保存</button></div>
      <textarea id="heroesJson"></textarea>
    </section>

    <section class="panel editor-panel">
      <div class="panel-head"><h2>スキルJSON</h2><button id="btnSaveSkills">スキル保存</button></div>
      <textarea id="skillsJson"></textarea>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
